<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sahne Hazırlanıyor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0714;
  --violet-100:#C4B5FD;
  --violet-300:#A78BFA;
  --grad-primary:linear-gradient(135deg,#A78BFA,#7C3AED);
  --text-muted:#A19DB0;
  --glow-ring:0 0 0 1px rgba(196,181,253,.3),0 0 26px rgba(139,92,246,.55),inset 0 1px 0 rgba(255,255,255,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:'Inter',system-ui,sans-serif;color:#fff;overflow:hidden;
  word-break:keep-all;overflow-wrap:normal;hyphens:none}
.page{
  height:100vh;position:relative;max-width:400px;margin:0 auto;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0 28px;
}

.demo-bar{
  position:fixed;top:0;left:0;right:0;z-index:50;
  background:rgba(10,7,20,.95);border-bottom:1px solid rgba(167,139,250,.25);
  padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:10px;
}
.demo-bar button{
  background:var(--grad-primary);border:none;color:#fff;font-size:12px;font-weight:700;
  padding:6px 14px;border-radius:10px;cursor:pointer;font-family:inherit;
}

/* ============ ARKA PLANDA SÜZÜLEN HEDEF KELİMELER ============ */
.word-bg{
  position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;
}
.word-bg span{
  position:absolute;color:rgba(167,139,250,.16);font-weight:700;
  opacity:0;white-space:nowrap;
}
@keyframes floatWord{
  0%{opacity:0;transform:translateY(14px) scale(.94)}
  15%{opacity:1;transform:translateY(0) scale(1)}
  85%{opacity:1}
  100%{opacity:0;transform:translateY(-14px) scale(.96)}
}

/* ============ ÖN PLAN İÇERİK ============ */
.content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;width:100%}

.title-wrap{text-align:center}
.scene-title{
  font-size:22px;font-weight:800;
  opacity:0;transform:translateY(30px);
}
.summary-text{
  margin-top:10px;font-size:13.5px;line-height:1.55;color:var(--text-muted);
  text-align:center;max-width:320px;
  opacity:0;
}

.icon-wrap{position:relative;width:96px;height:96px;margin-top:34px}
.icon-circle{
  width:80px;height:80px;border-radius:50%;
  background:var(--grad-primary);box-shadow:var(--glow-ring);
  display:flex;align-items:center;justify-content:center;
  position:absolute;top:8px;left:8px;
  transform:scale(.7);opacity:0;
}
.icon-circle svg{width:34px;height:34px}
.check-badge{
  position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;
  background:#16A34A;border:3px solid var(--bg);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.5);
}
.check-badge svg{width:13px;height:13px}

.status-line{
  margin-top:14px;font-size:12px;color:var(--text-muted);opacity:0;
  display:flex;align-items:center;gap:5px;transition:color .2s;
}
.status-line svg{width:13px;height:13px;opacity:0;transform:translateX(-3px);transition:opacity .25s,transform .25s}
.status-line.ready{
  color:var(--violet-100);font-weight:700;cursor:pointer;
}
.status-line.ready svg{opacity:1;transform:translateX(0);animation:nudge 1.2s ease-in-out infinite}
@keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(3px)}}

/* ============ ANİMASYON SIRASI ============ */
@keyframes titleIn{
  0%{opacity:0;transform:translateY(30px) scale(1.04)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes iconIn{
  0%{transform:scale(.7);opacity:0}
  60%{transform:scale(1.08);opacity:1}
  100%{transform:scale(1);opacity:1}
}
@keyframes checkIn{
  0%{opacity:0;transform:scale(.5)}
  100%{opacity:1;transform:scale(1)}
}
@keyframes pageFadeOut{0%{opacity:1}100%{opacity:0}}

/* Zamanlama: başlık önce belirir (ortada), sonra üst konumuna "kayar" gibi
   hisseden fade+translate ile yerleşir; hemen ardından arka plan kelimeleri
   akmaya başlar; özet belirir; en son ikon+onay rozeti gelir. */
.playing .scene-title{animation:titleIn .5s cubic-bezier(.22,1,.36,1) .1s forwards}
.playing .word-bg span{animation-play-state:running}
.playing .summary-text{animation:fadeIn .45s ease .75s forwards}
.playing .icon-circle{animation:iconIn .5s cubic-bezier(.34,1.56,.64,1) 1.3s forwards}
.playing .check-badge{animation:checkIn .3s cubic-bezier(.34,1.56,.64,1) 1.85s forwards}
.playing .status-line{animation:fadeIn .4s ease 1.3s forwards}
.playing.leaving{animation:pageFadeOut .4s ease forwards}
</style>
</head>
<body>

<div class="demo-bar">
  Önizleme — Hazır Tema geçişi (~2.6sn, otomatik)
  <button onclick="playTransition()">Tekrar oynat</button>
</div>

<div class="page" id="page">

  <div class="word-bg" id="wordBg"></div>

  <div class="content">
    <div class="title-wrap">
      <h2 class="scene-title">Yeliz'in Hikâyesi</h2>
      <p class="summary-text">Seyahat sırasında telefonunu kaybeden ve son anda bulup uçağa yetişen Yeliz'in hikâyesi.</p>
    </div>

    <div class="icon-wrap">
      <div class="icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
      </div>
      <div class="check-badge">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
      </div>
    </div>

    <p class="status-line" id="statusLine">
      <span id="statusText">Sahnen hazırlanıyor</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
    </p>
  </div>

</div>

<script>
const targetWords = ["travel","airport","journey","flight","ticket","luggage","road","island","sunset","adventure"];

function buildWordBg(){
  const el = document.getElementById('wordBg');
  el.innerHTML = '';
  const positions = [
    {top:'8%',  left:'8%',  size:13},
    {top:'14%', left:'62%', size:16},
    {top:'26%', left:'20%', size:12},
    {top:'34%', left:'70%', size:14},
    {top:'46%', left:'6%',  size:15},
    {top:'54%', left:'58%', size:12},
    {top:'66%', left:'24%', size:16},
    {top:'74%', left:'66%', size:13},
    {top:'84%', left:'12%', size:14},
    {top:'90%', left:'54%', size:12},
  ];
  targetWords.forEach((w, i) => {
    const span = document.createElement('span');
    span.textContent = w;
    const p = positions[i % positions.length];
    span.style.top = p.top;
    span.style.left = p.left;
    span.style.fontSize = p.size + 'px';
    span.style.animation = `floatWord 3.2s ease ${0.6 + i*0.22}s infinite`;
    el.appendChild(span);
  });
}
buildWordBg();

function triggerLeave(){
  const page = document.getElementById('page');
  const statusLine = document.getElementById('statusLine');
  statusLine.onclick = null;
  page.classList.add('leaving');
  setTimeout(() => {
    alert('→ AI Story & Quiz ekranına geçiş burada tetiklenir (kullanıcı "Sahnen hazır!" satırına dokundu).');
    page.classList.remove('leaving');
    page.style.opacity = 1;
  }, 420);
}

function playTransition(){
  const page = document.getElementById('page');
  const statusLine = document.getElementById('statusLine');
  const statusText = document.getElementById('statusText');
  page.classList.remove('playing','leaving');
  statusLine.classList.remove('ready');
  statusLine.onclick = null;
  statusText.textContent = 'Sahnen hazırlanıyor';
  void page.offsetWidth;
  buildWordBg();
  page.classList.add('playing');

  // Giriş animasyonu tamamlanınca (check rozeti belirdikten kısa süre sonra)
  // metin "Sahnen hazır!" olur ve dokunulabilir hale gelir.
  // OTOMATİK YÖNLENDİRME YOK — sadece dokunma ile geçilir.
  setTimeout(() => {
    statusText.textContent = 'Sahnen hazır!';
    statusLine.classList.add('ready');
    statusLine.onclick = triggerLeave;
  }, 2300);
}
playTransition();
</script>

</body>
</html>
