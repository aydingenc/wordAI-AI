<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Quiz Ekranı — Canlı Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,600&display=swap');
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ width:100%; height:100%; overflow:hidden; background:#050409; }
  body{ font-family:'Inter',sans-serif; display:flex; justify-content:center; align-items:center; }

  :root{
    --violet-400:#a78bfa; --violet-500:#8b5cf6; --violet-600:#7c3aed;
    --green-bg:rgba(34,197,94,0.16); --green-fg:#4ade80; --green-bd:rgba(74,222,128,0.4);
    --red-bg:rgba(248,113,113,0.16); --red-fg:#f87171; --red-bd:rgba(248,113,113,0.4);
    --text-hi:#f5f3ff; --text-mid:#b9b3d1; --text-low:#6f6a8a;
  }

  .device{
    width:390px; height:844px; position:relative; overflow:hidden;
    background:radial-gradient(120% 50% at 50% 0%, rgba(124,58,237,0.18) 0%, rgba(124,58,237,0) 55%), #08070d;
    border-radius:36px; box-shadow:0 40px 100px rgba(0,0,0,0.6);
  }
  .screen{ position:absolute; inset:0; padding:40px 20px 34px; display:none; flex-direction:column; }
  .screen.active{ display:flex; }

  /* ============ INTRO ============ */
  #intro{ justify-content:center; align-items:center; text-align:center; gap:6px; }
  .intro-badge{
    width:64px; height:64px; border-radius:20px; margin-bottom:6px;
    background:linear-gradient(155deg, var(--violet-400), var(--violet-600));
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 14px 30px -10px rgba(124,58,237,0.8);
  }
  .intro-badge svg{ width:28px; height:28px; }
  .intro-title{ font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--text-hi); margin-bottom:6px; }
  .intro-sub{ font-size:13.5px; color:var(--text-mid); margin-bottom:22px; max-width:280px; line-height:1.55; }
  .intro-words{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:28px; max-width:300px; }
  .intro-word-pill{
    font-size:13px; font-weight:700; padding:6px 13px; border-radius:999px;
    background:var(--red-bg); color:var(--red-fg); border:1px solid var(--red-bd);
  }
  .intro-meta{ font-size:12px; color:var(--text-low); margin-bottom:24px; }
  .big-btn{
    width:100%; max-width:280px; padding:16px; border-radius:16px; border:none;
    font-size:15px; font-weight:800; color:#fff; cursor:pointer;
    background:linear-gradient(135deg, var(--violet-400), var(--violet-600));
    box-shadow:0 14px 30px -10px rgba(124,58,237,0.8);
  }

  /* ============ QUIZ TOP BAR ============ */
  .quiz-top{ display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .quiz-progress-track{ flex:1; height:6px; border-radius:3px; background:rgba(255,255,255,0.08); overflow:hidden; }
  .quiz-progress-fill{ height:100%; background:linear-gradient(90deg, var(--violet-400), var(--violet-500)); border-radius:3px; transition:width 0.4s ease; }
  .streak-badge{
    display:flex; align-items:center; gap:4px; padding:5px 10px; border-radius:999px;
    background:rgba(251,146,60,0.15); border:1px solid rgba(251,146,60,0.35);
    font-size:13px; font-weight:800; color:#fb923c;
    transition:transform 0.25s ease;
  }
  .streak-badge.pulse{ animation:streakPulse 0.4s ease; }
  @keyframes streakPulse{ 0%{transform:scale(1);} 40%{transform:scale(1.25);} 100%{transform:scale(1);} }

  /* ============ QUESTION CARD ============ */
  .q-kicker-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .q-kicker{ font-size:11px; font-weight:800; color:var(--violet-400); letter-spacing:0.03em; }
  .help-btn{
    display:flex; align-items:center; gap:4px; padding:4px 9px; border-radius:999px;
    background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1);
    font-size:11px; font-weight:700; color:var(--text-mid); cursor:pointer;
  }
  .help-btn svg{ width:11px; height:11px; }
  .help-panel{
    display:none; margin-bottom:14px; padding:10px 12px; border-radius:10px;
    background:rgba(139,92,246,0.08); border:1px dashed rgba(139,92,246,0.3);
    font-size:12.5px; color:#c4b5fd; line-height:1.5;
  }
  .help-panel.show{ display:block; animation:fadeUp 0.25s ease; }
  .q-text{ font-family:'Fraunces',serif; font-size:19px; color:var(--text-hi); line-height:1.45; margin-bottom:24px; }
  .q-text mark{ background:none; color:#c4b5fd; font-family:'Inter',sans-serif; font-weight:800; border-bottom:2px dashed rgba(167,139,250,0.5); }
  .choices{ display:flex; flex-direction:column; gap:10px; }
  .choice{
    padding:15px 16px; border-radius:14px; background:rgba(255,255,255,0.03);
    border:1.5px solid rgba(255,255,255,0.08); color:var(--text-hi); font-size:14.5px; font-weight:600;
    cursor:pointer; transition:all 0.2s ease; text-align:left;
  }
  .choice:active{ transform:scale(0.98); }
  .choice.correct{ background:rgba(34,197,94,0.18); border-color:#4ade80; color:#4ade80; }
  .choice.wrong{ background:rgba(248,113,113,0.18); border-color:#f87171; color:#f87171; animation:shake 0.4s ease; }
  .choice.dim{ opacity:0.35; }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }

  .feedback-banner{
    margin-top:18px; padding:12px 14px; border-radius:12px; font-size:13px; font-weight:700;
    display:none; align-items:center; gap:8px;
  }
  .feedback-banner.show{ display:flex; animation:fadeUp 0.3s ease; }
  .feedback-banner.correct{ background:rgba(34,197,94,0.14); color:#4ade80; }
  .feedback-banner.wrong{ background:rgba(248,113,113,0.14); color:#f87171; }
  @keyframes fadeUp{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .next-q-btn{
    margin-top:auto; padding:15px; border-radius:14px; border:none; font-size:14.5px; font-weight:800;
    color:#fff; background:linear-gradient(135deg, var(--violet-400), var(--violet-600));
    box-shadow:0 12px 26px -10px rgba(124,58,237,0.8); cursor:pointer; display:none;
  }
  .next-q-btn.show{ display:block; }

  /* ============ CONFETTI ============ */
  .confetti-layer{ position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:50; }
  .confetti-piece{
    position:absolute; top:-10px; width:7px; height:11px; opacity:0.9;
    animation:confettiFall linear forwards;
  }
  @keyframes confettiFall{
    0%{ transform:translateY(0) rotate(0deg); opacity:1; }
    100%{ transform:translateY(760px) rotate(540deg); opacity:0; }
  }

  /* ============ RESULTS ============ */
  #results{ justify-content:flex-start; align-items:center; text-align:center; padding-top:44px; }
  .score-ring-wrap{ position:relative; width:140px; height:140px; margin-bottom:8px; }
  .score-ring-wrap::before{
    content:''; position:absolute; inset:-20px; border-radius:50%;
    background:radial-gradient(circle, var(--ring-glow, rgba(74,222,128,0.35)) 0%, rgba(0,0,0,0) 70%);
  }
  .score-ring-wrap svg{ position:relative; width:100%; height:100%; transform:rotate(-90deg); }
  .score-track{ fill:none; stroke:rgba(255,255,255,0.1); stroke-width:8; }
  .score-fill{ fill:none; stroke:var(--ring-color, #4ade80); stroke-width:8; stroke-linecap:round; stroke-dasharray:377; stroke-dashoffset:377; filter:drop-shadow(0 0 6px var(--ring-color, #4ade80)); transition:stroke-dashoffset 1.2s cubic-bezier(.2,.8,.3,1); }
  .score-center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .score-emoji{ font-size:28px; line-height:1; margin-bottom:2px; }
  .score-num{ font-size:22px; font-weight:900; color:#fff; }
  .score-label{ font-size:10px; color:var(--text-mid); margin-top:1px; }

  .xp-line{ font-size:14px; font-weight:800; color:#fbbf24; margin:14px 0 6px; opacity:0; transition:opacity 0.4s ease; }
  .xp-line.show{ opacity:1; }

  .results-title{ font-family:'Fraunces',serif; font-size:20px; font-weight:600; color:var(--text-hi); margin:8px 0 4px; }
  .results-sub{ font-size:12.5px; color:var(--text-low); margin-bottom:20px; max-width:280px; line-height:1.5; }

  .transform-row{ display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:26px; max-width:320px; }
  .transform-pill{
    position:relative; font-size:13px; font-weight:700; padding:7px 14px; border-radius:999px;
    background:var(--red-bg); color:var(--red-fg); border:1.5px solid var(--red-bd);
    transition:background 0.5s ease, color 0.5s ease, border-color 0.5s ease, transform 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  .transform-pill.done{
    background:var(--green-bg); color:var(--green-fg); border-color:var(--green-bd);
    transform:scale(1.12);
  }
  .transform-pill .check{ margin-left:4px; opacity:0; transition:opacity 0.3s ease 0.2s; }
  .transform-pill.done .check{ opacity:1; }

  .results-btn{
    width:100%; padding:16px; border-radius:16px; border:none; font-size:15px; font-weight:800; color:#fff;
    background:var(--btn-gradient, linear-gradient(135deg, #34d399, #059669));
    box-shadow:0 14px 30px -10px rgba(16,185,129,0.7);
    cursor:pointer; opacity:0; transition:opacity 0.4s ease;
  }
  .results-btn.show{ opacity:1; }
</style>
</head>
<body>

<div class="device">

  <!-- ============ INTRO ============ -->
  <div class="screen active" id="intro">
    <div class="intro-badge"><svg viewBox="0 0 24 24" fill="none"><path d="M12 2l2.6 6.6L21 9.3l-5 4.5L17.4 21 12 17.4 6.6 21 8 13.8l-5-4.5 6.4-0.7z" fill="white"/></svg></div>
    <div class="intro-title">Kelimeleri Fethet</div>
    <div class="intro-sub" id="introSub">Bu hikâyede ilk kez gördüğün kelimeler var. Onları ve hikâyeyi ne kadar anladığını test edelim.</div>
    <div class="intro-words" id="introWords"></div>
    <div class="intro-meta" id="introMeta">8 soru · ~2 dakika</div>
    <button class="big-btn" onclick="startQuiz()">Başla</button>
  </div>

  <!-- ============ QUIZ ============ -->
  <div class="screen" id="quiz">
    <div class="quiz-top">
      <div class="quiz-progress-track"><div class="quiz-progress-fill" id="progressFill"></div></div>
      <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">0</span></div>
    </div>
    <div class="q-kicker-row">
      <div class="q-kicker" id="qKicker">KELİME · 1/8</div>
      <div class="help-btn" onclick="toggleHelp()">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 17v.01M12 14c0-2 2-2 2-4a2 2 0 10-4 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/></svg>
        Yardım
      </div>
    </div>
    <div class="help-panel" id="helpPanel"></div>
    <div class="q-text" id="qText"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-banner" id="feedbackBanner"></div>
    <button class="next-q-btn" id="nextBtn" onclick="nextQuestion()">Sonraki Soru →</button>
  </div>

  <!-- ============ RESULTS ============ -->
  <div class="screen" id="results">
    <div class="score-ring-wrap" id="scoreRingWrap">
      <svg viewBox="0 0 132 132">
        <circle class="score-track" cx="66" cy="66" r="60"/>
        <circle class="score-fill" id="scoreFill" cx="66" cy="66" r="60"/>
      </svg>
      <div class="score-center">
        <div class="score-emoji" id="scoreEmoji">🎉</div>
        <div class="score-num" id="scoreNum">0/8</div>
      </div>
    </div>
    <div class="xp-line" id="xpLine">+120 XP kazandın</div>
    <div class="results-title" id="resultsTitle">5 Kelime artık senin!</div>
    <div class="results-sub" id="resultsSub">Bu kelimeler bir daha "yeni" olarak gelmeyecek</div>
    <div class="transform-row" id="transformRow"></div>
    <button class="results-btn" id="resultsBtn" onclick="alert('Devam edilecek')">Harika, Devam Et</button>
  </div>

  <div class="confetti-layer" id="confettiLayer"></div>

</div>

<script>
/* ================= DATA ================= */
// targetWords.length drives how many WORD questions are generated —
// 5 words -> 5 word questions, 7 words -> 7 word questions, etc.
var targetWords = [
  {word:'adventure', sentence:'"Every step felt like the start of a new <mark>___</mark>."', choices:['adventure','fear','tiredness','boredom'], correct:0, tr:'İpucu: Bu kelime, yeni ve bilinmeyen bir şeye atılan, heyecan verici ve biraz riskli bir deneyimi anlatır.'},
  {word:'journey', sentence:'"It was going to be a long <mark>___</mark>."', choices:['hotel','journey','ticket','airport'], correct:1, tr:'İpucu: Bu kelime, bir yerden başka bir yere yapılan (genellikle uzun süren) bir seyahati anlatır.'},
  {word:'luggage', sentence:'"Carrying her <mark>___</mark> became harder every hour."', choices:['luggage','document','food','map'], correct:0, tr:'İpucu: Bu kelime, seyahat ederken yanında taşıdığın valiz/bavul gibi eşyaları anlatır.'},
  {word:'passport', sentence:'"She had to show her <mark>___</mark> at the counter."', choices:['credit card','ticket','passport','key'], correct:2, tr:'İpucu: Bu kelime, yurt dışına çıkarken kimliğini kanıtlamak için gösterdiğin resmi belgedir.'},
  {word:'gate', sentence:'"He checked the <mark>___</mark> number one more time."', choices:['gate','carousel','counter','lounge'], correct:0, tr:'İpucu: Bu kelime, havalimanında uçağa binerken geçtiğin, üzerinde numara yazan kapıyı anlatır.'}
];

var comprehensionQuestions = [
  {text:'Where was Sara traveling from and to?', choices:['Lisbon to Istanbul','Istanbul to Lisbon','Ankara to Paris','Izmir to Rome'], correct:1, tr:'İpucu: Hikâyenin en başında, Sara\u2019nın biletinde yazan şehir isimlerine dikkat et.'},
  {text:'Who did Sara meet at the gate?', choices:['A young teacher','An elderly man traveling alone','A pilot','A journalist'], correct:1, tr:'İpucu: Kapıda beklerken Sara\u2019nın yanına oturan kişinin yaşını ve neden yalnız seyahat ettiğini hatırla.'},
  {text:'How does Sara feel at the end of the story?', choices:['Regretful','Tired and angry','Excited and happy','Indifferent'], correct:2, tr:'İpucu: Hikâyenin son sayfasında Sara\u2019nın defterine yazdığı cümledeki duyguya bak.'}
];

/* Build the full question list: N word questions (N = targetWords.length), then comprehension */
var questions = targetWords.map(function(w, i){
  return {
    kicker: 'KELİME · ' + (i+1) + '/' + (targetWords.length + comprehensionQuestions.length),
    text: w.sentence,
    choices: w.choices,
    correct: w.correct,
    tr: w.tr,
    isWordQuestion: true,
    word: w.word
  };
}).concat(comprehensionQuestions.map(function(c, i){
  return {
    kicker: 'ANLAMA · ' + (targetWords.length + i + 1) + '/' + (targetWords.length + comprehensionQuestions.length),
    text: c.text,
    choices: c.choices,
    correct: c.correct,
    tr: c.tr,
    isWordQuestion: false
  };
}));

var current = 0, correctCount = 0, streak = 0, answered = false;
var wordResults = {}; // word -> true/false, tracks per-target-word correctness

function initIntro(){
  var introWords = document.getElementById('introWords');
  introWords.innerHTML = targetWords.map(function(w){
    return '<div class="intro-word-pill">'+w.word+'</div>';
  }).join('');
  document.getElementById('introMeta').textContent = questions.length + ' soru · ~' + Math.max(1, Math.round(questions.length/4)) + ' dakika';
}
initIntro();

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}

function startQuiz(){
  showScreen('quiz');
  current = 0; correctCount = 0; streak = 0; wordResults = {};
  renderQuestion();
}

function toggleHelp(){
  var panel = document.getElementById('helpPanel');
  panel.classList.toggle('show');
}

function renderQuestion(){
  answered = false;
  var q = questions[current];
  document.getElementById('progressFill').style.width = ((current)/questions.length*100)+'%';
  document.getElementById('qKicker').textContent = q.kicker;
  document.getElementById('qText').innerHTML = q.text;
  var helpPanel = document.getElementById('helpPanel');
  helpPanel.classList.remove('show');
  helpPanel.textContent = q.tr;
  var choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach(function(choice, i){
    var btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = choice;
    btn.onclick = function(){ selectAnswer(i, btn); };
    choicesEl.appendChild(btn);
  });
  var fb = document.getElementById('feedbackBanner');
  fb.className = 'feedback-banner';
  fb.innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');
}

function selectAnswer(i, btnEl){
  if(answered) return;
  answered = true;
  var q = questions[current];
  var allBtns = document.querySelectorAll('.choice');
  var fb = document.getElementById('feedbackBanner');
  var isCorrect = (i === q.correct);

  if(q.isWordQuestion){ wordResults[q.word] = isCorrect; }

  if(isCorrect){
    btnEl.classList.add('correct');
    correctCount++;
    streak++;
    fb.className = 'feedback-banner correct show';
    fb.innerHTML = '✓ Harika! Doğru cevap.';
    burstConfetti();
    var sb = document.getElementById('streakBadge');
    document.getElementById('streakNum').textContent = streak;
    sb.classList.remove('pulse'); void sb.offsetWidth; sb.classList.add('pulse');
  } else {
    btnEl.classList.add('wrong');
    allBtns[q.correct].classList.add('correct');
    streak = 0;
    document.getElementById('streakNum').textContent = streak;
    fb.className = 'feedback-banner wrong show';
    fb.innerHTML = '✗ Doğrusu: "' + q.choices[q.correct] + '"';
  }
  allBtns.forEach(function(b, idx){
    if(idx !== i && idx !== q.correct) b.classList.add('dim');
    b.onclick = null;
  });
  document.getElementById('nextBtn').classList.add('show');
}

function nextQuestion(){
  current++;
  if(current >= questions.length){
    document.getElementById('progressFill').style.width = '100%';
    showResults();
  } else {
    renderQuestion();
  }
}

function burstConfetti(){
  var layer = document.getElementById('confettiLayer');
  var colors = ['#8b5cf6','#4ade80','#fbbf24','#60a5fa','#f87171'];
  for(var i=0;i<24;i++){
    var p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.left = (10 + Math.random()*80) + '%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDuration = (1.2 + Math.random()*0.8) + 's';
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    layer.appendChild(p);
    (function(el){ setTimeout(function(){ el.remove(); }, 2200); })(p);
  }
}

/* ================= RESULTS (tiered by score) ================= */
function getResultTier(pct){
  if(pct < 0.4){
    return {
      emoji:'😢', ringColor:'#f87171', ringGlow:'rgba(248,113,113,0.35)',
      title:'Yeterli değil', sub:'Metne tekrar dön, bol bol oku ve dinle.',
      btnGradient:'linear-gradient(135deg, #a78bfa, #7c3aed)', btnText:'Hikâye\u2019ye Geri Dön',
      xpMultiplier:5
    };
  } else if(pct < 0.7){
    return {
      emoji:'🙂', ringColor:'#facc15', ringGlow:'rgba(250,204,21,0.35)',
      title:'Fena değil, gelişiyorsun', sub:'Bazı kelimeleri tekrar gözden geçirmek iyi olur.',
      btnGradient:'linear-gradient(135deg, #fbbf24, #d97706)', btnText:'Devam Et',
      xpMultiplier:10
    };
  } else {
    return {
      emoji:'🎉', ringColor:'#4ade80', ringGlow:'rgba(74,222,128,0.35)',
      title:null, sub:'Bu kelimeler bir daha "yeni" olarak gelmeyecek',
      btnGradient:'linear-gradient(135deg, #34d399, #059669)', btnText:'Harika, Devam Et',
      xpMultiplier:15
    };
  }
}

function showResults(){
  showScreen('results');
  var pct = correctCount / questions.length;
  var tier = getResultTier(pct);
  var circumference = 377;

  document.getElementById('scoreRingWrap').style.setProperty('--ring-color', tier.ringColor);
  document.getElementById('scoreRingWrap').style.setProperty('--ring-glow', tier.ringGlow);
  document.getElementById('scoreEmoji').textContent = tier.emoji;
  document.getElementById('resultsBtn').style.setProperty('--btn-gradient', tier.btnGradient);
  document.getElementById('resultsBtn').textContent = tier.btnText;

  var learnedCount = Object.values(wordResults).filter(Boolean).length;
  document.getElementById('resultsTitle').textContent = tier.title || (learnedCount + ' Kelime artık senin!');
  document.getElementById('resultsSub').textContent = tier.sub;

  setTimeout(function(){
    document.getElementById('scoreFill').style.strokeDashoffset = circumference - (circumference * pct);
  }, 200);
  var scoreNumEl = document.getElementById('scoreNum');
  var target = correctCount, cur = 0;
  var counter = setInterval(function(){
    cur++;
    scoreNumEl.textContent = cur + '/' + questions.length;
    if(cur >= target){ scoreNumEl.textContent = target + '/' + questions.length; clearInterval(counter); }
  }, 150);

  var xp = correctCount * tier.xpMultiplier;
  document.getElementById('xpLine').textContent = '+' + xp + ' XP kazandın';
  setTimeout(function(){ document.getElementById('xpLine').classList.add('show'); }, 900);

  // Transform row: only the target words the user actually answered
  // correctly flip to green — words missed stay red (accurate per-word credit)
  var transformRow = document.getElementById('transformRow');
  transformRow.innerHTML = targetWords.map(function(w){
    return '<div class="transform-pill" data-word="'+w.word+'">'+w.word+'<span class="check">✓</span></div>';
  }).join('');

  setTimeout(function(){
    var pills = document.querySelectorAll('.transform-pill');
    var delay = 0;
    pills.forEach(function(p){
      var word = p.getAttribute('data-word');
      if(wordResults[word]){
        setTimeout(function(){
          p.classList.add('done');
          burstConfetti();
        }, delay);
        delay += 220;
      }
    });
  }, 1400);

  setTimeout(function(){ document.getElementById('resultsBtn').classList.add('show'); }, 1400 + targetWords.length*220 + 400);
}
</script>

</body>
</html>
