<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1060" viewBox="0 0 1680 1060" role="img" aria-labelledby="title desc">
  <title id="title">Görsellerden Öğren UI düzeltme karşılaştırması</title>
  <desc id="desc">Sol panelde önceki sorunlu hero blob, geniş spacing ve solid upload border; sağ panelde blob kaldırılmış, spacing sıkılaştırılmış ve upload border dashed yapılmış hali gösterilir.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07040e"/><stop offset="1" stop-color="#10091d"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#8b5cf6"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#201139"/><stop offset="1" stop-color="#080512"/></linearGradient>
    <linearGradient id="mountain" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#5b21b6"/><stop offset="0.48" stop-color="#2e1065"/><stop offset="1" stop-color="#090512"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1680" height="1060" fill="#05030a"/>
  <text x="60" y="70" fill="#f5f3ff" font-family="Inter, Arial" font-size="34" font-weight="700">PR #3 UI karşılaştırması</text>
  <text x="60" y="106" fill="#a79fc4" font-family="Inter, Arial" font-size="18">Sol: önceki sorunlu görünüm · Sağ: bu commit sonrası beklenen görünüm</text>

  <g transform="translate(60 150)">
    <text x="0" y="-28" fill="#fca5a5" font-family="Inter, Arial" font-size="24" font-weight="700">Önce</text>
    <rect width="740" height="850" rx="36" fill="url(#bg)" stroke="#2a2342"/>
    <circle cx="610" cy="72" r="135" fill="#7c3aed" opacity="0.42" filter="url(#glow)"/>
    <text x="36" y="72" fill="#c084fc" font-family="Arial" font-size="44">‹</text>
    <text x="36" y="135" fill="#fff" font-family="Inter, Arial" font-size="38" font-weight="700">Görsellerden Öğren ✦</text>
    <text x="36" y="178" fill="#c8bfdc" font-family="Inter, Arial" font-size="20">Kendi fotoğrafını yükle, AI analiz etsin,</text>
    <text x="36" y="206" fill="#c8bfdc" font-family="Inter, Arial" font-size="20">sana özel kelimeler ve hikâyeler oluştursun.</text>
    <g transform="translate(568 52)"><rect x="-36" y="30" width="56" height="42" rx="6" fill="#5b21b6" stroke="#e9d5ff" transform="rotate(-18)"/><rect x="24" y="58" width="56" height="42" rx="6" fill="#6d28d9" stroke="#e9d5ff" transform="rotate(16)"/><rect x="0" y="0" width="82" height="70" rx="28" fill="url(#violet)"/><rect x="14" y="18" width="54" height="34" rx="15" fill="#13051f"/><text x="25" y="43" fill="#fff" font-size="18">⌒⌒</text></g>
    <g transform="translate(36 260)"><rect width="330" height="58" rx="17" fill="url(#violet)"/><text x="78" y="37" fill="#fff" font-family="Inter, Arial" font-size="17" font-weight="700">Kendi Görselini Yükle</text></g>
    <g transform="translate(366 260)"><rect width="330" height="58" rx="17" fill="#090512" stroke="#3b3160"/><text x="116" y="37" fill="#a79fc4" font-family="Inter, Arial" font-size="17" font-weight="700">Hazır Temalar</text></g>
    <g transform="translate(36 350)"><rect width="660" height="305" rx="22" fill="url(#mountain)" stroke="#8b5cf6" stroke-width="2"/><circle cx="330" cy="88" r="48" fill="url(#violet)"/><text x="246" y="154" fill="#fff" font-family="Inter, Arial" font-size="28" font-weight="700">Görselini Yükle</text><text x="192" y="190" fill="#ddd6fe" font-family="Inter, Arial" font-size="17">Fotoğraf çek ya da galerinden seç.</text><g transform="translate(45 230)"><rect width="265" height="65" rx="18" fill="#0b0713" stroke="#6d28d9"/><text x="94" y="39" fill="#fff" font-family="Inter, Arial" font-size="18" font-weight="700">Fotoğraf Çek</text></g><g transform="translate(350 230)"><rect width="265" height="65" rx="18" fill="#0b0713" stroke="#6d28d9"/><text x="94" y="39" fill="#fff" font-family="Inter, Arial" font-size="18" font-weight="700">Galeriden Seç</text></g></g>
    <text x="36" y="704" fill="#fca5a5" font-family="Inter, Arial" font-size="17" font-weight="700">Sorunlar: mor blob, fazla dikey boşluk, solid upload border</text>
  </g>

  <g transform="translate(880 150)">
    <text x="0" y="-28" fill="#86efac" font-family="Inter, Arial" font-size="24" font-weight="700">Şimdi</text>
    <rect width="740" height="850" rx="36" fill="url(#bg)" stroke="#2a2342"/>
    <text x="36" y="60" fill="#c084fc" font-family="Arial" font-size="44">‹</text>
    <text x="36" y="118" fill="#fff" font-family="Inter, Arial" font-size="38" font-weight="700">Görsellerden Öğren ✦</text>
    <text x="36" y="154" fill="#c8bfdc" font-family="Inter, Arial" font-size="20">Kendi fotoğrafını yükle, AI analiz etsin,</text>
    <text x="36" y="180" fill="#c8bfdc" font-family="Inter, Arial" font-size="20">sana özel kelimeler ve hikâyeler oluştursun.</text>
    <g transform="translate(574 36)"><text x="-26" y="0" fill="#c084fc" font-size="24">✦</text><text x="86" y="22" fill="#e9d5ff" font-size="19">✧</text><rect x="-38" y="44" width="56" height="42" rx="6" fill="#5b21b6" stroke="#e9d5ff" transform="rotate(-15)"/><rect x="30" y="62" width="56" height="42" rx="6" fill="#6d28d9" stroke="#e9d5ff" transform="rotate(14)"/><rect x="10" y="96" width="56" height="42" rx="6" fill="#7c3aed" stroke="#e9d5ff" transform="rotate(4)"/><rect x="0" y="12" width="66" height="58" rx="24" fill="url(#violet)"/><rect x="9" y="26" width="48" height="31" rx="15" fill="#13051f"/><text x="21" y="48" fill="#fff" font-size="17">⌒⌒</text></g>
    <g transform="translate(36 220)"><rect width="330" height="47" rx="15" fill="url(#violet)"/><text x="78" y="31" fill="#fff" font-family="Inter, Arial" font-size="17" font-weight="700">Kendi Görselini Yükle</text></g>
    <g transform="translate(366 220)"><rect width="330" height="47" rx="15" fill="#090512" stroke="#3b3160"/><text x="116" y="31" fill="#a79fc4" font-family="Inter, Arial" font-size="17" font-weight="700">Hazır Temalar</text></g>
    <g transform="translate(36 292)"><rect width="660" height="276" rx="22" fill="url(#mountain)" stroke="#c084fc" stroke-width="2" stroke-dasharray="7 7"/><circle cx="330" cy="78" r="39" fill="url(#violet)"/><text x="252" y="133" fill="#fff" font-family="Inter, Arial" font-size="26" font-weight="700">Görselini Yükle</text><text x="192" y="166" fill="#ddd6fe" font-family="Inter, Arial" font-size="17">Fotoğraf çek ya da galerinden seç.</text><g transform="translate(45 208)"><rect width="265" height="58" rx="18" fill="#0b0713" stroke="#6d28d9"/><text x="94" y="36" fill="#fff" font-family="Inter, Arial" font-size="18" font-weight="700">Fotoğraf Çek</text></g><g transform="translate(350 208)"><rect width="265" height="58" rx="18" fill="#0b0713" stroke="#6d28d9"/><text x="94" y="36" fill="#fff" font-family="Inter, Arial" font-size="18" font-weight="700">Galeriden Seç</text></g></g>
    <g transform="translate(36 608)"><rect width="660" height="72" rx="20" fill="#17112a" stroke="#2a2342"/><text x="46" y="45" fill="#c084fc" font-family="Arial" font-size="42">✓</text><text x="96" y="34" fill="#fff" font-family="Inter, Arial" font-size="18" font-weight="700">Güvenli Görsel Analizi</text><text x="96" y="57" fill="#a79fc4" font-family="Inter, Arial" font-size="14">Shield checkmark ve outline lock stili korunur.</text><rect x="590" y="16" width="48" height="40" rx="14" fill="transparent" stroke="#8b5cf6"/></g>
    <text x="36" y="724" fill="#86efac" font-family="Inter, Arial" font-size="17" font-weight="700">Düz koyu hero, daha sıkı spacing, dashed mor upload border</text>
  </g>
</svg>
