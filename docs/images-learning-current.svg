<svg xmlns="http://www.w3.org/2000/svg" width="820" height="1180" viewBox="0 0 820 1180" role="img" aria-labelledby="title desc">
  <title id="title">Görsellerden Öğren son ekran görüntüsü</title>
  <desc id="desc">Yeni palette göre koyu mor arka plan, yumuşak radial maskot glow, dashed upload border, shield check ve outline lock görünen ekran.</desc>
  <defs>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#A78BFA"/><stop offset="1" stop-color="#7C3AED"/></linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#C084FC"/><stop offset="0.52" stop-color="#9333EA"/><stop offset="1" stop-color="#6D28D9"/></linearGradient>
    <linearGradient id="photo" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#3B1B6D"/><stop offset="0.45" stop-color="#15111F"/><stop offset="1" stop-color="#0A0714"/></linearGradient>
    <radialGradient id="mascotGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#A78BFA" stop-opacity="0.45"/><stop offset="55%" stop-color="#7C3AED" stop-opacity="0.16"/><stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/></radialGradient>
    <filter id="blur24"><feGaussianBlur stdDeviation="24"/></filter>
  </defs>
  <rect width="820" height="1180" fill="#0A0714"/>
  <g transform="translate(24 38)">
    <circle cx="22" cy="22" r="21" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.44)"/><text x="12" y="32" fill="#C4B5FD" font-size="32">‹</text>
    <text x="0" y="92" fill="#fff" font-family="Inter,Arial" font-size="28" font-weight="800">Görsellerden Öğren ✦</text>
    <text x="0" y="128" fill="#9CA3AF" font-family="Inter,Arial" font-size="14">Kendi fotoğrafını yükle, AI analiz etsin, sana özel</text>
    <text x="0" y="150" fill="#9CA3AF" font-family="Inter,Arial" font-size="14">kelimeler ve hikâyeler oluştursun.</text>
    <g transform="translate(620 6)">
      <circle cx="63" cy="56" r="56" fill="url(#mascotGlow)"/>
      <text x="6" y="18" fill="#C4B5FD" font-size="18">✦</text><text x="104" y="34" fill="#C4B5FD" font-size="18">✧</text>
      <rect x="8" y="50" width="40" height="31" rx="5" fill="rgba(124,58,237,0.42)" stroke="#C4B5FD" transform="rotate(-15 28 65)"/>
      <rect x="78" y="62" width="40" height="31" rx="5" fill="rgba(124,58,237,0.42)" stroke="#C4B5FD" transform="rotate(14 98 77)"/>
      <rect x="45" y="88" width="40" height="31" rx="5" fill="rgba(124,58,237,0.42)" stroke="#C4B5FD" transform="rotate(4 65 103)"/>
      <rect x="30" y="25" width="66" height="58" rx="24" fill="url(#primary)"/>
      <rect x="39" y="39" width="48" height="31" rx="15" fill="#0A0714"/><text x="52" y="60" fill="#fff" font-size="16">⌒⌒</text>
    </g>
  </g>
  <g transform="translate(24 196)">
    <rect width="772" height="60" rx="30" fill="#15111F" stroke="rgba(167,139,250,0.2)"/>
    <rect x="4" y="4" width="382" height="52" rx="26" fill="url(#primary)"/><text x="86" y="37" fill="#fff" font-family="Inter,Arial" font-size="15" font-weight="700">1  Kendi Görselini Yükle</text>
    <text x="515" y="37" fill="#9CA3AF" font-family="Inter,Arial" font-size="15" font-weight="700">2  Hazır Temalar</text>
  </g>
  <g transform="translate(24 276)">
    <rect width="772" height="292" rx="24" fill="url(#photo)" stroke="rgba(167,139,250,0.44)" stroke-width="1.6" stroke-dasharray="8 7"/>
    <circle cx="386" cy="84" r="39" fill="url(#primary)"/><text x="357" y="96" fill="#fff" font-size="42">☁</text>
    <text x="319" y="148" fill="#fff" font-family="Inter,Arial" font-size="18" font-weight="700">Görselini Yükle</text>
    <text x="278" y="178" fill="#9CA3AF" font-family="Inter,Arial" font-size="14">Fotoğraf çek ya da galerinden seç.</text>
    <text x="218" y="200" fill="#9CA3AF" font-family="Inter,Arial" font-size="14">Tek bir görseli kişisel İngilizce dersine dönüştür.</text>
    <rect x="64" y="226" width="300" height="52" rx="16" fill="rgba(21,17,31,0.84)" stroke="rgba(167,139,250,0.2)"/><text x="154" y="258" fill="#fff" font-family="Inter,Arial" font-size="16" font-weight="700">Fotoğraf Çek</text>
    <rect x="408" y="226" width="300" height="52" rx="16" fill="rgba(21,17,31,0.84)" stroke="rgba(167,139,250,0.2)"/><text x="498" y="258" fill="#fff" font-family="Inter,Arial" font-size="16" font-weight="700">Galeriden Seç</text>
  </g>
  <g transform="translate(24 588)">
    <rect width="244" height="142" rx="20" fill="#15111F" stroke="rgba(167,139,250,0.2)"/><rect x="20" y="18" width="58" height="58" rx="29" fill="url(#primary)"/><text x="20" y="102" fill="#fff" font-size="15" font-weight="700">Görsele Uygun</text><text x="20" y="123" fill="#9CA3AF" font-size="13">AI, ana nesneleri seçer.</text>
    <rect x="264" width="244" height="142" rx="20" fill="#15111F" stroke="rgba(167,139,250,0.2)"/><rect x="284" y="18" width="58" height="58" rx="29" fill="url(#primary)"/><text x="284" y="102" fill="#fff" font-size="15" font-weight="700">Hikaye + Quiz</text><text x="284" y="123" fill="#9CA3AF" font-size="13">Seviyene uygun içerik.</text>
    <rect x="528" width="244" height="142" rx="20" fill="#15111F" stroke="rgba(167,139,250,0.2)"/><rect x="548" y="18" width="58" height="58" rx="29" fill="url(#primary)"/><text x="548" y="102" fill="#fff" font-size="15" font-weight="700">Kelime Kartları</text><text x="548" y="123" fill="#9CA3AF" font-size="13">Tekrarla, pekiştir.</text>
  </g>
  <g transform="translate(24 750)"><rect width="772" height="92" rx="22" fill="#15111F" stroke="rgba(167,139,250,0.2)"/><text x="34" y="58" fill="#C4B5FD" font-size="46">✓</text><text x="106" y="38" fill="#fff" font-size="17" font-weight="700">Güvenli Görsel Analizi</text><text x="106" y="63" fill="#9CA3AF" font-size="13">Uygunsuz içerikler analizden geçmez.</text><rect x="690" y="18" width="58" height="58" rx="16" fill="transparent" stroke="rgba(167,139,250,0.44)"/><text x="707" y="56" fill="#C4B5FD" font-size="28">🔒</text></g>
  <g transform="translate(24 992)"><rect x="40" y="32" width="692" height="42" rx="24" fill="#9333EA" opacity="0.35" filter="url(#blur24)"/><rect width="772" height="76" rx="20" fill="url(#cta)"/><text x="260" y="48" fill="#fff" font-family="Inter,Arial" font-size="23" font-weight="800">✦  Hikâyeyi Başlat  →</text></g>
</svg>
